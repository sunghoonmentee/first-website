<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 영어 단어장</title>

<style>

body{
    font-family:sans-serif;
    background:#f4f7fb;
    margin:0;
    padding:0;
}

header{
    background:#2563eb;
    color:white;
    text-align:center;
    padding:40px 20px;
}

.container{
    max-width:800px;
    margin:auto;
    padding:30px 20px;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:30px;
}

.search-box input{
    flex:1;
    padding:15px;
    font-size:18px;
    border:2px solid #2563eb;
    border-radius:10px;
}

.search-box button{
    padding:15px 20px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.word{
    font-size:40px;
    color:#2563eb;
    margin-bottom:10px;
}

.phonetic{
    color:gray;
    margin-bottom:20px;
}

.meaning{
    font-size:24px;
    margin-bottom:20px;
    font-weight:bold;
}

.example{
    background:#f3f4f6;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
    line-height:1.7;
}

.translate{
    color:#2563eb;
    margin-top:15px;
    font-weight:bold;
}

.loading{
    text-align:center;
    font-size:20px;
}

button{
    padding:12px 18px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:10px;
    cursor:pointer;
    margin-top:15px;
}

</style>
</head>

<body>

<header>
    <h1>📘 AI 영어 단어장..</h1>
    <p>아무 영어 단어나 검색해보세요</p>
</header>

<div class="container">

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="영어 단어 입력..."
        >

        <button onclick="searchWord()">
            검색
        </button>

    </div>

    <div id="result"></div>

</div>

<script>

async function searchWord(){

    const word = document
        .getElementById("searchInput")
        .value
        .trim()
        .toLowerCase();

    const result = document.getElementById("result");

    if(word === ""){

        result.innerHTML = `
            <div class="card">
                단어를 입력해주세요.
            </div>
        `;

        return;
    }

    result.innerHTML = `
        <div class="loading">
            🔍 검색중...
        </div>
    `;

    try{

        // 영어 사전 API
        const response = await fetch(
            "https://api.dictionaryapi.dev/api/v2/entries/en/" + word
        );

        const data = await response.json();

        if(data.title === "No Definitions Found"){

            result.innerHTML = `
                <div class="card">
                    ❌ 단어를 찾을 수 없습니다.
                </div>
            `;

            return;
        }

        const item = data[0];

        // 발음
        const phonetic =
            item.phonetic || "발음 정보 없음";

        // 영어 뜻
        const englishMeaning =
            item.meanings?.[0]
            ?.definitions?.[0]
            ?.definition || "뜻 없음";

        // 예문
        let example =
            item.meanings?.[0]
            ?.definitions?.[0]
            ?.example;

        // 예문 없으면 자동 생성
        if(!example){
            example =
                `I use the word "${word}" every day.`;
        }

        // 뜻 번역
        const meaningTranslate = await fetch(
            `https://api.mymemory.translated.net/get?q=${englishMeaning}&langpair=en|ko`
        );

        const meaningData =
            await meaningTranslate.json();

        const koreanMeaning =
            meaningData.responseData.translatedText;

        // 예문 번역
        const exampleTranslate = await fetch(
            `https://api.mymemory.translated.net/get?q=${example}&langpair=en|ko`
        );

        const exampleData =
            await exampleTranslate.json();

        const koreanExample =
            exampleData.responseData.translatedText;

        // 화면 출력
        result.innerHTML = `
            <div class="card">

                <div class="word">
                    ${item.word}
                </div>

                <div class="phonetic">
                    ${phonetic}
                </div>

                <div class="meaning">
                    🇰🇷 뜻 : ${koreanMeaning}
                </div>

                <button onclick="speakWord('${item.word}')">
                    🔊 발음 듣기
                </button>

                <div class="example">

                    <strong>📖 영어 예문</strong><br><br>

                    ${example}

                    <div class="translate">

                        🇰🇷 예문 해석<br><br>

                        ${koreanExample}

                    </div>

                </div>

            </div>
        `;

    }catch(error){

        result.innerHTML = `
            <div class="card">
                ❌ 오류 발생
            </div>
        `;

        console.error(error);
    }
}

// 발음 기능
function speakWord(word){

    const speech =
        new SpeechSynthesisUtterance(word);

    speech.lang = "en-US";

    window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
